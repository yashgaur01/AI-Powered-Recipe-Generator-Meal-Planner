services:
  db:
    image: postgres:16
    container_name: recipe_planner_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: recipe_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
